<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Nexora AI - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet">
    <link href="css/tailwind.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="js/common.js" defer></script>
</head>

<body
    class="bg-background text-on-surface font-body-md text-body-md min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Abstract Background Pattern -->
    <div class="absolute inset-0 pointer-events-none opacity-40 overflow-hidden">
        <div
            class="absolute -top-20 -left-20 w-96 h-96 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob">
        </div>
        <div
            class="absolute top-40 -right-20 w-72 h-72 bg-tertiary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute -bottom-32 left-1/2 w-80 h-80 bg-surface-variant rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Login Card -->
    <div
        class="glass-card rounded-[24px] p-stack-lg max-w-md w-full mx-margin-mobile md:mx-auto relative z-10">

        <!-- Header -->
        <div class="text-center mb-stack-lg">
            <div class="inline-flex items-center justify-center mb-stack-sm">
                <a href="index.html"><img src="img/logo.png" alt="Nexora" class="h-12 w-auto"></a>
            </div>
            <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Chào mừng trở lại!</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Tiếp tục hành trình chinh phục sự nghiệp cùng
                AI.</p>
        </div>

        <!-- Social Login -->
        <button
            class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant rounded-xl py-3 px-4 hover:bg-surface-container-low hover:border-primary-fixed-dim transition-all duration-200 shadow-sm mb-stack-md group">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4"></path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"></path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"></path>
            </svg>
            <span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Đăng
                nhập bằng Google</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-4 mb-stack-md">
            <div class="h-px bg-outline-variant flex-1"></div>
            <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Hoặc đăng nhập
                bằng Email</span>
            <div class="h-px bg-outline-variant flex-1"></div>
        </div>

        <!-- Form -->
        <form id="login-form" class="space-y-stack-md">
            <div>
                <label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary-fixed-dim focus:border-primary transition-shadow"
                        id="email" placeholder="VD: nguyenvanA@gmail.com" required type="email">
                </div>
            </div>
            <div>
                <label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Mật khẩu</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary-fixed-dim focus:border-primary transition-shadow"
                        id="password" minlength="6" autocomplete="current-password" placeholder="••••••••" required type="password">
                </div>
            </div>
            <!-- Actions -->
            <div class="flex items-center justify-between mt-stack-sm mb-stack-lg">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input
                        class="rounded text-primary focus:ring-primary border-outline-variant bg-surface-container-lowest w-4 h-4"
                        type="checkbox">
                    <span class="font-label-md text-label-md text-on-surface-variant">Ghi nhớ đăng nhập</span>
                </label>
                <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant hover:underline transition-colors"
                    href="#">Quên mật khẩu?</a>
            </div>
            <!-- Submit Button -->
            <button
                class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md font-bold rounded-xl py-3 px-4 shadow-md hover:shadow-lg transition-all duration-200 active:scale-95 flex justify-center items-center gap-2"
                type="submit">
                Đăng nhập
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-stack-lg text-center">
            <p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản?
                <a class="font-label-md text-label-md text-primary font-bold hover:underline ml-1"
                    href="register.html">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var emailInput = document.getElementById('email');
            var email = (emailInput && emailInput.value) ? emailInput.value : 'user@nexora.ai';
            var name = email.split('@')[0].replace(/[._-]+/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); }) || 'User';
            
            // Clear any old avatar before logging in a new user
            localStorage.removeItem('nexora_avatar');
            
            window.NexoraAuth.setAuth({ name: name, email: email, plan: 'Pro' });
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
