<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Nexora - Tạo tài khoản mới</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link href="css/tailwind.css" rel="stylesheet"><link href="css/styles.css" rel="stylesheet">
    <style>
        body { background-color: #F5F3FF; }
    </style>
    <script src="js/common.js" defer></script>
</head>

<body
    class="font-body-md text-body-md antialiased bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-on-surface">
    <div
        class="w-full max-w-md bg-surface-container-lowest rounded-[24px] shadow-[0px_4px_20px_rgba(0,0,0,0.05)] p-stack-lg border border-outline-variant/30">

        <!-- Header -->
        <div class="text-center mb-stack-lg">
            <div class="flex justify-center mb-stack-sm">
                <a href="index.html"><img src="img/logo.png" alt="Nexora" class="h-12 w-auto"></a>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-unit">Tạo tài khoản mới</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Bắt đầu luyện tập phỏng vấn thực chiến ngay hôm
                nay.</p>
        </div>

        <!-- Social Signup -->
        <button
            class="w-full flex items-center justify-center gap-2 bg-surface-container-lowest border border-outline-variant rounded-xl py-3 px-4 hover:bg-surface-container-low transition-colors duration-200 shadow-sm group">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4"></path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"></path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"></path>
            </svg>
            <span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Đăng
                ký bằng Google</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center my-stack-md">
            <div class="flex-grow border-t border-outline-variant/50"></div>
            <span class="px-3 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Hoặc đăng ký
                bằng Email</span>
            <div class="flex-grow border-t border-outline-variant/50"></div>
        </div>

        <!-- Form -->
        <form id="register-form" class="space-y-stack-md">
            <!-- Basic Info -->
            <div class="space-y-stack-md">
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="fullname">Họ và tên</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-[20px]">person</span>
                        </div>
                        <input
                            class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                            id="fullname" name="fullname" autocomplete="name" placeholder="Nhập họ và tên" required type="text">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="email">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-[20px]">mail</span>
                        </div>
                        <input
                            class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                            id="email" name="email" autocomplete="email" placeholder="Nhập địa chỉ email" required type="email">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="phone">Số điện thoại</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-[20px]">call</span>
                        </div>
                        <input
                            class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                            id="phone" name="phone" autocomplete="tel" pattern="[0-9+ ]{9,15}" placeholder="Nhập số điện thoại" required type="tel">
                    </div>
                </div>
            </div>

            <!-- Personal Details -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="dob">Ngày sinh</label>
                    <input
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                        id="dob" name="dob" type="date">
                </div>
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="gender">Giới tính</label>
                    <select
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                        id="gender" name="gender">
                        <option value="">Chọn</option>
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                        <option value="other">Khác</option>
                    </select>
                </div>
            </div>

            <!-- Education Group -->
            <div class="space-y-stack-md p-4 bg-surface-container-low/50 rounded-xl border border-outline-variant/30">
                <p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Thông tin học vấn
                </p>
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="university">Trường đại
                        học</label>
                    <input
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                        id="university" name="university" placeholder="Tên trường đại học" type="text">
                </div>
                <div class="space-y-1">
                    <label class="block font-label-md text-label-md text-on-surface" for="major">Ngành học</label>
                    <input
                        class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                        id="major" name="major" placeholder="Ngành học của bạn" type="text">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block font-label-md text-label-md text-on-surface" for="grad_year">Năm tốt
                            nghiệp</label>
                        <input
                            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                            id="grad_year" name="grad_year" placeholder="YYYY" type="number">
                    </div>
                    <div class="space-y-1">
                        <label class="block font-label-md text-label-md text-on-surface" for="gpa">Điểm GPA</label>
                        <input
                            class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                            id="gpa" name="gpa" placeholder="0.0" step="0.1" type="number">
                    </div>
                </div>
            </div>

            <!-- Security -->
            <div class="space-y-1">
                <label class="block font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
                    </div>
                    <input
                        class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm"
                        id="password" name="password" minlength="6" autocomplete="new-password" placeholder="Tạo mật khẩu" required type="password">
                </div>
            </div>

            <!-- Terms & Submit -->
            <div class="flex items-start gap-2 pt-unit">
                <div class="flex items-center h-5">
                    <input
                        class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary focus:ring-2 cursor-pointer"
                        id="terms" required type="checkbox">
                </div>
                <label class="font-body-md text-[14px] text-on-surface-variant leading-tight cursor-pointer"
                    for="terms">
                    Tôi đồng ý với <a class="text-primary hover:underline hover:text-on-tertiary-fixed-variant transition-colors"
                        href="#">Điều khoản</a> và <a class="text-primary hover:underline hover:text-on-tertiary-fixed-variant transition-colors"
                        href="#">Chính sách bảo mật</a>
                </label>
            </div>
            <button
                class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-4 rounded-xl hover:bg-primary/90 transition-all duration-200 shadow-[0px_4px_10px_rgba(53,37,205,0.2)] hover:shadow-[0px_6px_15px_rgba(53,37,205,0.3)] mt-stack-md"
                type="submit">
                Đăng ký tài khoản
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-stack-lg text-center">
            <p class="font-body-md text-body-md text-on-surface-variant">
                Đã có tài khoản? <a class="text-primary font-label-md text-label-md hover:underline hover:text-on-tertiary-fixed-variant transition-colors"
                    href="login.html">Đăng nhập</a>
            </p>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const fullname = (document.getElementById('fullname').value || '').trim() || 'Người dùng mới';
            
            // Clear old avatar
            localStorage.removeItem('nexora_avatar');
            
            window.NexoraAuth.setAuth({ name: fullname, plan: 'Pro' });
            window.location.href = window.NexoraUI?.getSavedAuthDestination?.('dashboard.html') || 'dashboard.html';
        });
    </script>
</body>

</html>
